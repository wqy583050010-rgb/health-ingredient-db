name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 关键：恢复正确的源码入口 index.html（deploy 末尾会把构建产物写回 index.html，
      # 若不恢复，下一次构建会拿“已构建的单文件 HTML”当入口，导致数据被旧产物覆盖）
      - name: Restore source entry
        run: cp index.src.html index.html

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TS from JSON
        run: python scripts/build_from_json.py --no-build

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build main site
        run: npm run build

      # 管理面板已弃用，不再构建（避免阻塞主站部署）
      - name: Publish to Pages (main root)
        run: |
          cp dist/index.html ./index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f index.html
          git commit -m "deploy: auto-build" || echo "no changes"
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
